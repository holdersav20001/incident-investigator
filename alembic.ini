# Alembic configuration
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Database URL — override at runtime via env var or command line flag:
#   alembic -x sqlalchemy.url=postgresql://... upgrade head
# In CI/tests the test fixture overrides this programmatically.
sqlalchemy.url = sqlite:///./incidents.db

[post_write_hooks]
# No post-write hooks required

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
